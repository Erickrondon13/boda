<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Erick & Telma</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="css/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="admin-page">
        <header class="admin-header">
            <div>
                <p class="admin-kicker">Panel de administración</p>
                <h1>Erick & Telma</h1>
            </div>

            <div class="admin-actions-top">
                <button class="btn" id="btnRefresh">Actualizar</button>
                <button class="btn btn-primary" id="btnCopyAllLinks">Copiar todos los links</button>
                <button class="btn" id="btnExportCsv">Exportar CSV</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Invitados</span>
                <strong id="statTotal">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Confirmados</span>
                <strong id="statConfirmed">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pendientes</span>
                <strong id="statPending">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Personas confirmadas</span>
                <strong id="statConfirmedPeople">0</strong>
            </div>
        </section>

        <section class="admin-card filters-card">
            <div class="filters-row">
                <div class="field">
                    <label for="searchInput">Buscar</label>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre..." />
                </div>

                <div class="field">
                    <label for="statusFilter">Estado</label>
                    <select id="statusFilter">
                        <option value="all">Todos</option>
                        <option value="confirmed">Confirmados</option>
                        <option value="pending">Pendientes</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="admin-card table-card">
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Invitado</th>
                            <th>Cupos</th>
                            <th>RSVP</th>
                            <th>Cantidad</th>
                            <th>Invitación Especial</th>
                            <th>Esp. Aceptada</th>
                            <th>Token</th>
                            <th>Link</th>
                            <th>Link Especial</th>
                            <th>Mensaje</th>
                            <th>Fecha confirmación</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="12">Cargando invitados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <audio id="bgMusic" loop preload="auto">
        <source src="assets/base.webm" type="audio/webm" />
    </audio>

    <button class="music-btn" id="musicBtn" title="Play / Pause">♪</button>

    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>

    <script>
        (function() {
            var audio = document.getElementById('bgMusic');
            var musicBtn = document.getElementById('musicBtn');
            var isPlaying = false;

            musicBtn?.addEventListener('click', function() {
                if (isPlaying) {
                    audio.pause();
                    musicBtn.classList.remove('playing');
                } else {
                    audio.play().then(function() {
                        musicBtn.classList.add('playing');
                    }).catch(function() {});
                }
                isPlaying = !isPlaying;
            });
        })();
    </script>
</body>
</html>
